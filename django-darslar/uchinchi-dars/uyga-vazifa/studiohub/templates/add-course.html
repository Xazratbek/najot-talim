{% extends 'base.html' %}

{% block title %}Add Course - StudioHub{% endblock %}

{% block extra_styles %}
<style>
    .form-container {
        animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-wrapper {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        border-radius: 20px;
        padding: 3rem;
        box-shadow: 0 12px 40px rgba(15, 118, 110, 0.12);
        border: 1px solid var(--border);
    }

    .form-header {
        margin-bottom: 2.5rem;
        text-align: center;
    }

    .form-header h2 {
        font-family: 'Bricolage Grotesque', sans-serif;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: var(--primary);
        margin-bottom: 0.5rem;
    }

    .form-header p {
        color: var(--text-light);
        font-size: 0.95rem;
    }

    .form-group {
        margin-bottom: 1.75rem;
        animation: slideInUp 0.6s ease-out backwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }

    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(15px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .form-group label {
        display: block;
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--text);
        font-size: 0.95rem;
        letter-spacing: 0.3px;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        padding: 0.95rem 1.2rem;
        border: 2px solid var(--border);
        border-radius: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.95rem;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        background: var(--surface);
        color: var(--text);
    }

    .form-group input:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.1);
    }

    .form-group input::placeholder {
        color: var(--text-light);
    }

    .form-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2.5rem;
        animation: slideInUp 0.6s ease-out 0.4s backwards;
    }

    .btn-submit,
    .btn-cancel {
        flex: 1;
        padding: 1rem;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        font-family: 'DM Sans', sans-serif;
        letter-spacing: 0.3px;
    }

    .btn-submit {
        background: var(--gradient-1);
        color: white;
        box-shadow: 0 4px 16px rgba(15, 118, 110, 0.3);
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(15, 118, 110, 0.4);
    }

    .btn-cancel {
        background: var(--surface);
        color: var(--text);
        border: 2px solid var(--border);
    }

    .btn-cancel:hover {
        background: var(--border);
    }

    @media (max-width: 768px) {
        .form-wrapper {
            padding: 2rem;
            margin: 1rem;
        }

        .form-actions {
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-wrapper">
            <div class="form-header">
                <h2>Add New Course</h2>
                <p>Create a new course to share with students</p>
            </div>

            <form method="POST" action="{% url 'add-course' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label for="title">Course Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="Enter course title"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="instructor">Instructor Name</label>
                    <input
                        type="text"
                        id="instructor"
                        name="instructor"
                        placeholder="Enter instructor name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input
                        type="number"
                        id="price"
                        name="price"
                        placeholder="Enter course price"
                        step="0.01"
                        min="0"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit">Add Course</button>
                    <a href="{% url 'course-list' %}" class="btn-cancel" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
