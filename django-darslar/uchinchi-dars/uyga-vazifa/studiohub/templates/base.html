<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StudioHub{% endblock %}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,600;10..48,700&family=DM+Sans:ital,opsz,wght@0,9..146,400;0,9..146,500;0,9..146,600;1,9..146,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f766e;
            --primary-light: #14b8a6;
            --accent: #f59e0b;
            --accent-light: #fcd34d;
            --dark: #0f172a;
            --surface: #f8fafc;
            --surface-dark: #1e293b;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --gradient-1: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%);
            --gradient-2: linear-gradient(135deg, #f59e0b 0%, #fcd34d 100%);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--surface);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Animated background pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 50%, rgba(15, 118, 110, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(245, 158, 11, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(20, 184, 166, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        header {
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-light) 100%);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 20px rgba(15, 118, 110, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 700;
            font-size: 1.75rem;
            color: white;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo span {
            height: 28px;
            width: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--primary);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 2rem;
            font-weight: 500;
            transition: opacity 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        main {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            min-height: calc(100vh - 200px);
        }

        .page-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 3rem;
            max-width: 500px;
        }

        footer {
            background: var(--surface-dark);
            color: #cbd5e1;
            text-align: center;
            padding: 2rem;
            margin-top: 5rem;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }

            header {
                padding: 1rem;
            }

            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            nav a {
                margin-left: 1rem;
            }

            main {
                margin: 2rem auto;
                padding: 0 1rem;
            }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <span>📚</span>
                StudioHub
            </div>
            <nav>
                <a href="#courses">Courses</a>
                <a href="#students">Students</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 StudioHub. Learn. Create. Grow.</p>
    </footer>
</body>
</html>
