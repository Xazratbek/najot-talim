<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers - Gul Dokon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .add-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .add-btn:hover {
            background-color: #218838;
        }
        .flowers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .flower-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .flower-card:hover {
            transform: translateY(-5px);
        }
        .flower-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #e9ecef;
        }
        .flower-info {
            padding: 15px;
        }
        .flower-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 0 0 10px 0;
        }
        .flower-color {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .flower-price {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .flower-quantity {
            color: #999;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .view-btn {
            display: inline-block;
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .view-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Gul Dokon - Flower Shop</h1>
        <a href="{% url 'add_flower' %}" class="add-btn">+ Add New Flower</a>

        <div class="flowers-grid">
            {% for flower in flowers %}
                <div class="flower-card">
                    {% if flower.image %}
                        <img src="{{ flower.image.url }}" alt="{{ flower.name }}" class="flower-image">
                    {% else %}
                        <div class="flower-image" style="display: flex; align-items: center; justify-content: center; color: #ccc;">No Image</div>
                    {% endif %}
                    <div class="flower-info">
                        <p class="flower-name">{{ flower.name }}</p>
                        <p class="flower-color">Color: {{ flower.color }}</p>
                        <p class="flower-price">${{ flower.price }}</p>
                        <p class="flower-quantity">Stock: {{ flower.quantity }} available</p>
                        <a href="{% url 'flower-detail' flower.id %}" class="view-btn">View Details</a>
                    </div>
                </div>
            {% empty %}
                <p style="grid-column: 1/-1; text-align: center; color: #999;">No flowers available yet.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
