<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if flower %}Edit{% else %}Add{% endif %} Flower</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input[type="number"] {
            step: "0.01";
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0,123,255,0.25);
        }
        .form-buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        button,
        .cancel-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
        }
        button {
            background-color: #28a745;
            color: white;
        }
        button:hover {
            background-color: #218838;
        }
        .cancel-btn {
            background-color: #6c757d;
            color: white;
        }
        .cancel-btn:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{% if flower %}Edit Flower{% else %}Add New Flower{% endif %}</h1>

        <div class="form-container">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-group">
                    <label for="name">Flower Name *</label>
                    <input type="text" id="name" name="name" required
                           value="{% if flower %}{{ flower.0.name }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="color">Color *</label>
                    <input type="text" id="color" name="color" placeholder="e.g., Red, White, Pink" required
                           value="{% if flower %}{{ flower.0.color }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="price">Price ($) *</label>
                    <input type="number" id="price" name="price" step="0.01" min="0" required
                           value="{% if flower %}{{ flower.0.price }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity in Stock *</label>
                    <input type="number" id="quantity" name="quantity" min="0" required
                           value="{% if flower %}{{ flower.0.quantity }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Enter flower description...">{% if flower %}{{ flower.0.description }}{% endif %}</textarea>
                </div>

                <div class="form-group">
                    <label for="image">Flower Image</label>
                    <input type="file" id="image" name="image" accept="image/*">
                    {% if flower and flower.0.image %}
                        <p style="color: #666; margin-top: 10px;">Current image: <a href="{{ flower.0.image.url }}" target="_blank">View</a></p>
                    {% endif %}
                </div>

                <div class="form-buttons">
                    <button type="submit">{% if flower %}Update Flower{% else %}Add Flower{% endif %}</button>
                    <a href="{% url 'flowers_list' %}" class="cancel-btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
