<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitoblar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .book-list {
            list-style: none;
            padding: 0;
        }
        .book-item {
            background-color: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .book-title {
            font-weight: bold;
            font-size: 18px;
            color: #2c3e50;
        }
        .book-author {
            color: #7f8c8d;
            margin-top: 5px;
        }
        .book-pages {
            color: #95a5a6;
            font-size: 14px;
            margin-top: 5px;
        }
        .empty {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <button> <a href="{% url 'add' %}">Kitob qo'shish</a> </button>
    <h1>📚 Kitoblar Ro'yxati</h1>

    {% if books %}
        <ul class="book-list">
            {% for book in books %}
                <li class="book-item">
                    <div class="book-title">{{ book.title }}</div>
                    <div class="book-author">👤 Muallif: {{ book.author }}</div>
                    <div class="book-pages">📖 Sahifalar: {{ book.pages }}</div>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <div class="empty">Hali kitob qo'shilmagan</div>
    {% endif %}
</body>
</html>
