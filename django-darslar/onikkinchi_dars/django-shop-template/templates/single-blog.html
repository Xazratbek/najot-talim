{% extends "base.html" %}

{% block title %}{{ post.title }} | Blog{% endblock %}

{% block content %}
<article class="section">
    <div class="container article-shell reveal-group">
        <header class="article-header reveal">
            <p class="eyebrow">Article / {{ post.created_at|date:"d M Y" }}</p>
            <h1>{{ post.title }}</h1>
        </header>
        <figure class="article-visual reveal delay-1">
            <img src="{{ post.image.url }}" alt="{{ post.title }}">
        </figure>
        <div class="article-content reveal delay-2">
            {{ post.content|linebreaks }}
        </div>
        <div class="hero-actions reveal delay-3">
            <a class="button button-secondary" href="{% url 'blog' %}">Blogga qaytish</a>
            <a class="button button-primary" href="{% url 'index' %}">Katalogni ko‘rish</a>
        </div>
    </div>
</article>
{% endblock %}
