{% extends "base.html" %}
{% block title %}E'lon qo'shish{% endblock %}
{% block content %}
<div class="auth-layout">
    <section class="auth-showcase">
        <h1 style="font-family:'Space Grotesk',sans-serif;font-size:4rem;max-width:560px;margin:0;">Yangi e'loningizni joylang</h1>
        <p class="muted" style="max-width:560px;font-size:1.1rem;">Kerakli ma'lumotlarni to'ldiring va e'loningizni minglab foydalanuvchilarga ko'rsating.</p>
        <div class="auth-showcase__orb"></div>
    </section>
    <section class="auth-card">
        <h1>E'lon qo'shish</h1>
        <form method="post" enctype="multipart/form-data" class="form-stack">
            {% csrf_token %}
            {% include "includes/form_fields.html" %}
            <button class="btn btn--accent btn--block" type="submit">E'lonni joylash</button>
        </form>
    </section>
</div>
{% endblock %}
