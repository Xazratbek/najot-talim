{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BirSavdo{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
<div class="page-shell">
    <svg width="0" height="0" style="position:absolute">
        <symbol id="i-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572" />
        </symbol>
        <symbol id="i-search" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
        </symbol>
        <symbol id="i-megaphone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 3l9 9a1.5 1.5 0 0 1 0 2l-6 6a1.5 1.5 0 0 1 -2 0l-9 -9v-4a2 2 0 0 1 2 -2h4" />
            <circle cx="9" cy="9" r="2" />
        </symbol>
        <symbol id="i-message" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 20l1.3 -3.9a9 8 0 1 1 3.4 2.9l-4.7 1" />
        </symbol>
        <symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="12" cy="8" r="4"></circle>
            <path d="M4 20c2.5-4 13.5-4 16 0"></path>
        </symbol>
        <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
            <path d="M12 5v14M5 12h14"></path>
        </symbol>
        <symbol id="i-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 7h16M4 12h16M4 17h10"></path>
        </symbol>
        <symbol id="i-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="m9 6 6 6-6 6"></path>
        </symbol>
        <symbol id="i-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 20h4l10-10-4-4L4 16v4Z"></path>
            <path d="m12 6 4 4"></path>
        </symbol>
        <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 7h16"></path>
            <path d="M10 11v6M14 11v6"></path>
            <path d="M6 7l1 12h10l1-12"></path>
            <path d="M9 7V4h6v3"></path>
        </symbol>
        <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 3 5 6v6c0 5 3.3 7.8 7 9 3.7-1.2 7-4 7-9V6l-7-3Z"></path>
        </symbol>
        <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M10 17l5-5-5-5"></path>
            <path d="M15 12H4"></path>
            <path d="M20 4v16"></path>
        </symbol>
        <symbol id="i-folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"></path>
        </symbol>
        <symbol id="i-store" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M4 10h16l-1-5H5l-1 5Z"></path>
            <path d="M6 10v9h12v-9"></path>
            <path d="M10 14h4"></path>
        </symbol>
        <symbol id="i-doc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M7 3h7l5 5v13H7z"></path>
            <path d="M14 3v5h5"></path>
        </symbol>
        <symbol id="i-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" />
            <path d="M18 6m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" />
            <path d="M18 18m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0" />
            <path d="M8.7 10.7l6.6 -3.4" />
            <path d="M8.7 13.3l6.6 3.4" />
        </symbol>
        <symbol id="i-shield-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9.9 12.1l1.6 1.6 3.1-3.1" />
            <path d="M12 3a12 12 0 0 0 8.5 3a12 12 0 0 1 -8.5 15a12 12 0 0 1 -8.5 -15a12 12 0 0 0 8.5 -3" />
        </symbol>
    </svg>

    <div class="top-strip">
        <div class="top-strip__inner">
            <a class="brand" href="{% url 'listing:list' %}">bir<span>bir</span></a>
            <div class="top-strip__meta">
                <span class="pill-inline">Barcha hududlar</span>
                <span class="pill-inline">UZ</span>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="header__inner">
            <a class="btn btn--accent" href="{% url 'category:list' %}">
                <svg width="22" height="22"><use href="#i-grid"></use></svg>
                Kategoriyalar
            </a>

            <form class="header-search" action="{% block header_search_action %}{% url 'listing:list' %}{% endblock %}" method="get">
                <input class="header-search__field" type="search" name="q" placeholder="iPhone 15 Pro topish" value="{{ current_q|default:'' }}">
                <button class="btn btn--accent" type="submit" aria-label="Qidirish">
                    <svg width="22" height="22"><use href="#i-search"></use></svg>
                </button>
            </form>

            <nav class="header-actions">
                <a class="nav-link" href="{% if request.user.is_authenticated %}{% url 'accounts:profile' %}#favorites{% else %}{% url 'login' %}{% endif %}">
                    <span class="nav-link__icon"><svg width="22" height="22"><use href="#i-heart"></use></svg></span>
                    <span>Sevimlilar</span>
                </a>
                <a class="nav-link" href="{% if request.user.is_authenticated %}{% url 'accounts:profile' %}#my-listings{% else %}{% url 'login' %}{% endif %}">
                    <span class="nav-link__icon"><svg width="22" height="22"><use href="#i-megaphone"></use></svg></span>
                    <span>E'lonlar</span>
                </a>
                <a class="nav-link" href="/chat/">
                    <span class="nav-link__icon"><svg width="22" height="22"><use href="#i-message"></use></svg></span>
                    <span>Xabarlar</span>
                </a>
                <a class="nav-link {% block profile_nav_class %}{% endblock %}" href="{% if request.user.is_authenticated %}{% url 'accounts:profile' %}{% else %}{% url 'login' %}{% endif %}">
                    <span class="nav-link__icon icon-badge--accent"><svg width="22" height="22"><use href="#i-user"></use></svg></span>
                    <span>Profil</span>
                </a>
                <a class="btn btn--ghost hide-mobile" href="{% if request.user.is_authenticated %}{% url 'listing:create' %}{% else %}{% url 'login' %}{% endif %}">
                    Sotish
                    <svg width="18" height="18"><use href="#i-plus"></use></svg>
                </a>
            </nav>
        </div>
    </header>

    <main class="content-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-note">
        BirSavdo, real e'lonlar taxtasi oqimi uchun tayyor UI qatlam.
    </footer>
</div>

<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
