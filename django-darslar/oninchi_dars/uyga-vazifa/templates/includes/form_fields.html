{% for field in form %}
    <label class="field-label">
        <span>{{ field.label }}</span>
        {{ field }}
        {% if field.help_text %}
            <small class="muted">{{ field.help_text }}</small>
        {% endif %}
        {% for error in field.errors %}
            <small style="color:var(--danger);">{{ error }}</small>
        {% endfor %}
    </label>
{% endfor %}
