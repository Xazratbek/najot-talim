{% extends "base.html" %}
{% block title %}Parolni o'zgartirish{% endblock %}
{% block content %}
<div class="auth-layout">
    <section class="auth-showcase">
        <h1 style="font-family:'Space Grotesk',sans-serif;font-size:4rem;max-width:540px;margin:0;">Xavfsizlik birinchi o'rinda</h1>
        <p class="muted" style="max-width:520px;font-size:1.1rem;">Hisobingiz uchun yangi, ishonchli parol o'rnating.</p>
        <div class="auth-showcase__orb"></div>
    </section>
    <section class="auth-card">
        <h1>Parolni o'zgartirish</h1>
        <form method="post" class="form-stack">
            {% csrf_token %}
            {% include "includes/form_fields.html" %}
            <button class="btn btn--accent btn--block" type="submit">Parolni o'zgartirish</button>
        </form>
    </section>
</div>
{% endblock %}
