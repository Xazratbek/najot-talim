<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cars List</title>
</head>
<body>
    <a href="{% url 'cars-list' %}">Cars List</a>
    <a href="{% url 'category-list' %}">Category List</a>
    <a href="{% url 'cars-create' %}">Cars create</a>
    <a href="{% url 'category-create' %}">Category create</a><br><br>
    <form action="{% url 'search' %}" method="get" role="search">
    <label for="site-search">Mashina nomi bilan qidirish:</label>
    <input type="search" id="site-search" name="q" placeholder="Mashina nomini kiriting..." />
    <button type="submit">Qidirish</button>
    </form>
    <br><br><hr>
</form>

    {% for car in cars %}
        <h2><a href="{% url 'cars-detail' car.id %}">{{ car.model }}</a></h2><br><br>
    {% endfor %}
</body>
</html>
