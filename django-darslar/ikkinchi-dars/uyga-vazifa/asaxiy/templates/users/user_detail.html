<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ user.name }} - Foydalanuvchi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            margin-bottom: 30px;
            font-size: 1em;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }

        .user-header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 30px;
        }

        .user-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            margin: 0 auto 20px;
        }

        .user-header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .user-status {
            color: #764ba2;
            font-size: 0.95em;
            font-weight: 500;
        }

        .info-section {
            margin-bottom: 30px;
        }

        .info-label {
            color: #764ba2;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .info-value {
            color: #333;
            font-size: 1.1em;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .bio-section {
            background: linear-gradient(135deg, #f5f7ff 0%, #f0f0f5 100%);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }

        .bio-section p {
            color: #555;
            line-height: 1.8;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .meta-item {
            flex: 1;
            min-width: 120px;
        }

        .meta-label {
            color: #aaa;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .meta-value {
            color: #333;
            font-size: 1em;
            font-weight: 600;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'user_list' %}" class="back-link">← Orqaga qaytish</a>

        <div class="card">
            <div class="user-header">
                <div class="user-avatar">
                    {{ user.name|first|upper }}
                </div>
                <h1>{{ user.name }}</h1>
                <div class="user-status">Faol foydalanuvchi</div>
            </div>

            <div class="info-section">
                <label class="info-label">📧 Elektron Pochta</label>
                <div class="info-value">{{ user.email }}</div>
            </div>

            <div class="info-section">
                <label class="info-label">🎂 Yosh</label>
                <div class="info-value">{{ user.age }} yosh</div>
            </div>

            {% if user.bio %}
            <div class="bio-section">
                <label class="info-label">✍️ Tarjimai Hol</label>
                <p>{{ user.bio }}</p>
            </div>
            {% endif %}

            <div class="meta-info">
                <div class="meta-item">
                    <div class="meta-label">Ro'yxatdan O'tgan</div>
                    <div class="meta-value">{{ user.created_at|date:"d.m.Y" }}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Vaqti</div>
                    <div class="meta-value">{{ user.created_at|time:"H:i" }}</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">ID</div>
                    <div class="meta-value">#{{ user.id }}</div>
                </div>
            </div>

            <div class="action-buttons">
                <a href="{% url 'user_list' %}" class="btn btn-secondary">Barcha Foydalanuvchilar</a>
            </div>
        </div>
    </div>
</body>
</html>
