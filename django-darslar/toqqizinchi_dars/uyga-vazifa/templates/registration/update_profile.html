{% extends "base.html" %}
{% block title %}Profilni tahrirlash{% endblock title %}
{% block content %}
<section class="card" style="max-width: 640px; margin: 0 auto;">
    <h2 class="title">Profilni tahrirlash</h2>
    <p class="muted">Manzil va avatar ma'lumotlarini yangilang.</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-field">
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button class="btn btn-primary" type="submit">Yangilash</button>
    </form>
</section>
{% endblock content %}
