{% extends "base.html" %}
{% block title %}Parolni yangilash{% endblock title %}
{% block content %}
<section class="card" style="max-width: 640px; margin: 0 auto;">
    <h2 class="title">Parolni yangilash</h2>
    <p class="muted">Xavfsizlik uchun yangi kuchli parol kiriting.</p>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-field">
                {{ field.label_tag }}
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button class="btn btn-primary" type="submit">Saqlash</button>
    </form>
</section>
{% endblock content %}
