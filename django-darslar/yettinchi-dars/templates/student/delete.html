{% extends "base.html" %}

{% block content %}
<style>
    .delete-container {
        max-width: 500px;
        margin: 4rem auto;
    }

    .delete-card {
        background: white;
        border-radius: 15px;
        padding: 2.5rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        border: 2px solid var(--border);
    }

    .delete-icon {
        font-size: 3rem;
        text-align: center;
        margin-bottom: 1.5rem;
    }

    .delete-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        font-weight: 900;
        color: #e74c3c;
        margin-bottom: 1rem;
        text-align: center;
    }

    .delete-message {
        font-size: 1.1rem;
        color: var(--text);
        margin-bottom: 1.5rem;
        text-align: center;
        line-height: 1.6;
    }

    .student-name-highlight {
        font-weight: 700;
        color: var(--primary);
        background: linear-gradient(135deg, rgba(212, 165, 116, 0.2) 0%, rgba(45, 122, 62, 0.1) 100%);
        padding: 0.3rem 0.8rem;
        border-radius: 6px;
        display: inline-block;
        margin: 0 0.3rem;
    }

    .delete-warning {
        background: linear-gradient(135deg, rgba(231, 76, 60, 0.1) 0%, rgba(192, 57, 43, 0.05) 100%);
        border-left: 4px solid #e74c3c;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 2rem;
        color: #c0392b;
        font-weight: 500;
    }

    .delete-actions {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
    }

    .btn-delete-confirm {
        flex: 1;
        padding: 1rem 1.5rem;
        background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
        box-shadow: 0 6px 20px rgba(231, 76, 60, 0.3);
    }

    .btn-delete-confirm:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
    }

    .btn-cancel-delete {
        flex: 1;
        padding: 1rem 1.5rem;
        background: var(--light);
        color: var(--primary);
        border: 2px solid var(--border);
        border-radius: 10px;
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .btn-cancel-delete:hover {
        background: var(--border);
        transform: translateY(-3px);
    }
</style>

<div class="delete-container">
    <div class="delete-card">
        <div class="delete-icon">⚠️</div>

        <h1 class="delete-title">O'chirish Tasdiqlash</h1>

        <div class="delete-warning">
            🔔 Shu amalni qaytarib bo'lmaydi. Diqqat!
        </div>

        <p class="delete-message">
            Siz <span class="student-name-highlight">{{ student.ism }} {{ student.familiya }}</span> talabani o'chirmoqchi ekanligingizni tasdiqlaysizmi?
        </p>

        <form action="{% url 'student-delete' student.pk %}" method="post" style="display: none;" id="deleteForm">
            {% csrf_token %}
        </form>

        <div class="delete-actions">
            <button type="submit" form="deleteForm" class="btn-delete-confirm">🗑️ Ha, O'chir</button>
            <a href="{% url 'student-list' %}" class="btn-cancel-delete">← Yo'q, Bekor Qil</a>
        </div>
    </div>
</div>
{% endblock content %}
